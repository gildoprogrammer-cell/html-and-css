<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Informações Pessoais</h1>
        <form action="">
            <fieldset>
                <legend>Informações Pessoais</legend>
                <label for="nome" class="nome" id="nome">Insira Seu Nome</label>
                <input type="text" class="nome" id="nome" required placeholder="Ex: Gildo Virgilio Cumbane">
                <br>
                <label for="date" class="date" id="date">Data de Nascimento</label>
                <input type="date" name="date" id="date">
                <br>
                <label for="numbi">Número de ID</label>
                <input type="text" pattern="[0-9]{12}[A-B]" maxlength="13" placeholder="123456789906A" required>
                <br>
                <label for="estado-civil">Estado Civil</label>
                <select name="estado-civil" id="estado-civil">
                    <option value="1">Casado(a)</option>
                    <option value="2">Solteiro(a)</option>
                    <option value="3">Divorciado(a)</option>
                    <option value="4">Viúvo(a)</option>
                    <option value="" selected disabled hidden>Seleciona Seu Estado Civil</option>
                </select>
                <br><br>
                <label for="nacionalidade" id="nacionalidade" class="nacionalidade">Nacionalidade </label>
                <input list="nacionalidades" name="nacionalidade" placeholder="Insira Sua Nacionalidade"  class="nacionalidade" name="nacionalidade">
                <datalist id="nacionalidades">
                    <option value="Moçambicana">
                    <option value="Sul Africana">
                    <option value="Portuguesa">
                    <option value="Angolana">
                    <option value="Brasileira">
                </datalist>
                <br>
                <label for="email">Email</label>
                <input type="email" id="email" class="email" placeholder="Ex: seuemail@gmail.com" required>
                <br>
                <label for="phone">Insira seu Celular </label>
                <input type="phone" id="phone" class="phone" placeholder="Ex: +258849287159">
                <br>
                <label for="banc">Conta Bancária</label>
                <input type="text" maxlength="13" oninput="this.value = this.value.replace(/\D/g, '')" name="numero_conta" placeholder="Número da conta" required>
            </fieldset>
            <fieldset>
                <legend>Mais Informações</legend>
                <textarea name="info" id="info" class="info" cols="50" rows="5" placeholder="Escreva nesse campo as informações que achar relevante"></textarea>
            </fieldset>
            <button class="submeter" type="submit">SUBMETER O FORMULÁRIO</button>
        </form>
    </main>
</body>
</html>
