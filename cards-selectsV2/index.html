<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mycards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <h1>Eis os nossos produtos, compre e seja feliz</h1>
       <div class="cards">
         <div class="card">
            <label>
                <input type="checkbox" name="item" value="computador"> 
                Computador
            </label>
            <p>Vendidos 2/7</p>
        </div>
        <div class="card">
            <label>
                <input type="checkbox" name="item" value="carro"> 
                Carro
            </label>
            <p>Vendidos 5/10</p>
        </div>
        <div class="card">
            <label>
                <input type="checkbox" name="item" value="celular"> 
                Celular
            </label>
            <p>Vendidos 0/8</p>
        </div>
        <div class="card">
            <label>
                <input type="checkbox" name="item" value="televisao"> 
                Televisão
            </label>
            <p>Vendidos 1/7</p>
        </div>
        <div class="card">
            <label>
                <input type="checkbox" name="item" value="fogao"> 
                Fogão
            </label>
            <p>Vendidos 0/15</p>
        </div>
        <div class="card">
            <label>
                <input type="checkbox" name="item" value="lampadas"> 
                Lâmpada
            </label>
            <p>Vendidos 5/18</p>
        </div>
       </div>
        <input type="submit" value="Submeter">
    </form>
</body>
</html>
